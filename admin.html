<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FestCart | Counter Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f5f7;
  color:#111;
}

/* HEADER */

header{
  background:#111;
  color:white;
  padding:18px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:25px;
  font-weight:800;
}

.logo span{
  color:#ffb703;
}

.header-right{
  display:flex;
  gap:10px;
  align-items:center;
}

.logout,
.refresh{
  border:0;
  padding:10px 18px;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

.logout{
  display:none;
  background:#ffb703;
  color:#111;
}

.refresh{
  background:#111;
  color:white;
  border:1px solid #333;
}

/* LOGIN */

.login-box{
  width:90%;
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:35px;
  border-radius:22px;
  box-shadow:0 10px 35px rgba(0,0,0,.08);
}

.login-box h1{
  margin-bottom:10px;
}

.login-box p{
  color:#777;
  margin-bottom:25px;
}

.login-box input{
  width:100%;
  padding:14px;
  margin:8px 0 15px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

.login-box input:focus{
  border-color:#ffb703;
}

.login-btn{
  width:100%;
  padding:15px;
  border:0;
  border-radius:30px;
  background:#ffb703;
  font-weight:800;
  cursor:pointer;
}

.message{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  display:none;
}

.error{
  background:#ffe5e5;
  color:#b00020;
}

/* DASHBOARD */

.dashboard{
  display:none;
}

.container{
  width:90%;
  max-width:1200px;
  margin:35px auto;
}

.dashboard-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}

.dashboard-head h1{
  font-size:30px;
}

/* STATS */

.stats{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
  margin:25px 0 30px;
}

.stat{
  background:white;
  padding:24px;
  border-radius:18px;
  box-shadow:0 5px 20px rgba(0,0,0,.06);
}

.stat h3{
  color:#777;
  font-size:14px;
  margin-bottom:10px;
}

.stat strong{
  font-size:30px;
}

/* SEARCH */

.controls{
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
  margin-bottom:25px;
  display:grid;
  grid-template-columns:
  1fr 220px;
  gap:15px;
}

.controls input,
.controls select{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  outline:none;
  background:white;
}

.controls input:focus,
.controls select:focus{
  border-color:#ffb703;
}

/* ORDERS */

.order{
  background:white;
  padding:22px;
  margin-bottom:18px;
  border-radius:18px;
  box-shadow:0 5px 20px rgba(0,0,0,.06);
}

.order-top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:15px;
  border-bottom:1px solid #eee;
  padding-bottom:15px;
}

.booking-id{
  font-size:18px;
  font-weight:800;
}

.order-date{
  color:#777;
  font-size:13px;
  margin-top:5px;
}

.customer{
  margin-top:15px;
  line-height:1.8;
}

.items{
  margin-top:15px;
  padding:15px;
  background:#f7f7f7;
  border-radius:12px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:7px 0;
  border-bottom:1px solid #e5e5e5;
}

.item:last-child{
  border-bottom:0;
}

.total{
  margin-top:15px;
  font-size:20px;
  font-weight:800;
}

.status{
  padding:8px 14px;
  border-radius:20px;
  background:#fff3cd;
  font-weight:bold;
}

.order select{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:1px solid #ddd;
  border-radius:10px;
  background:white;
}

/* WHATSAPP BUTTON */

.whatsapp-btn{
  width:100%;
  margin-top:12px;
  padding:13px;
  border:0;
  border-radius:12px;
  background:#25D366;
  color:white;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.whatsapp-btn:hover{
  opacity:.9;
  transform:translateY(-1px);
}

/* EMPTY */

.empty{
  text-align:center;
  padding:50px;
  background:white;
  border-radius:18px;
  color:#777;
}

/* MOBILE */

@media(max-width:700px){

  .container{
    width:92%;
  }

  .controls{
    grid-template-columns:1fr;
  }

  header{
    padding:16px 4%;
  }

  .logo{
    font-size:21px;
  }

  .logout{
    padding:9px 14px;
  }

}

</style>
</head>


<body>


<!-- HEADER -->

<header>

<div class="logo">
Fest<span>Cart</span>
</div>


<div class="header-right">

<button
class="refresh"
id="refreshBtn"
onclick="loadOrders()"
style="display:none;"
>
🔄 Refresh
</button>


<button
class="logout"
id="logoutBtn"
onclick="logout()"
>
Logout
</button>

</div>

</header>



<!-- LOGIN -->

<div
class="login-box"
id="loginBox"
>

<h1>🔐 Admin Login</h1>

<p>
Login to manage FestCart orders.
</p>


<input
type="email"
id="email"
placeholder="Admin Email"
/>


<input
type="password"
id="password"
placeholder="Password"
/>


<button
class="login-btn"
onclick="login()"
>
Login
</button>


<div
class="message error"
id="loginError"
></div>

</div>



<!-- DASHBOARD -->

<div
class="dashboard"
id="dashboard"
>

<div class="container">


<div class="dashboard-head">

<h1>
📊 Counter Dashboard
</h1>

</div>



<!-- STATS -->

<div class="stats">


<div class="stat">

<h3>
Total Orders
</h3>

<strong id="totalOrders">
0
</strong>

</div>


<div class="stat">

<h3>
🆕 New Orders
</h3>

<strong id="newOrders">
0
</strong>

</div>


<div class="stat">

<h3>
🥤 Preparing
</h3>

<strong id="preparingOrders">
0
</strong>

</div>


<div class="stat">

<h3>
✅ Ready
</h3>

<strong id="readyOrders">
0
</strong>

</div>


<div class="stat">

<h3>
🎉 Collected
</h3>

<strong id="collectedOrders">
0
</strong>

</div>


<div class="stat">

<h3>
💰 Total Sales
</h3>

<strong>
₹<span id="totalSales">0</span>
</strong>

</div>

</div>



<!-- SEARCH & FILTER -->

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="🔎 Search Booking ID, Name or Mobile..."
oninput="applyFilters()"
/>


<select
id="statusFilter"
onchange="applyFilters()"
>

<option value="all">
All Orders
</option>

<option value="new">
🆕 New
</option>

<option value="preparing">
🥤 Preparing
</option>

<option value="ready">
✅ Ready
</option>

<option value="collected">
🎉 Collected
</option>

</select>

</div>



<!-- ORDERS -->

<div id="orders">

<div class="empty">
Loading orders...
</div>

</div>


</div>

</div>



<script>


/* SUPABASE */

const SUPABASE_URL =
"https://pzdtpnvgdbomqmuyzhtv.supabase.co";


const SUPABASE_PUBLISHABLE_KEY =
"sb_publishable_DqbtaPNKSD_1ELESNwy54Q_ForkRGvn";


const supabaseClient =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_PUBLISHABLE_KEY
);



/* GLOBAL ORDERS */

let allOrders = [];



/* LOGIN */

async function login(){

const email =
document
.getElementById("email")
.value
.trim();


const password =
document
.getElementById("password")
.value;


const errorBox =
document
.getElementById("loginError");


errorBox.style.display="none";


if(!email || !password){

errorBox.innerText =
"Please enter email and password.";

errorBox.style.display="block";

return;

}


const {data,error} =
await supabaseClient
.auth
.signInWithPassword({

email:email,

password:password

});


if(error){

errorBox.innerText =
"Invalid email or password.";

errorBox.style.display="block";

return;

}


showDashboard();

}



/* SHOW DASHBOARD */

function showDashboard(){

document
.getElementById("loginBox")
.style.display="none";


document
.getElementById("dashboard")
.style.display="block";


document
.getElementById("logoutBtn")
.style.display="block";


document
.getElementById("refreshBtn")
.style.display="block";


loadOrders();

}



/* LOGOUT */

async function logout(){

await supabaseClient
.auth
.signOut();


document
.getElementById("dashboard")
.style.display="none";


document
.getElementById("loginBox")
.style.display="block";


document
.getElementById("logoutBtn")
.style.display="none";


document
.getElementById("refreshBtn")
.style.display="none";


}



/* SESSION CHECK */

async function checkSession(){

const {data} =
await supabaseClient
.auth
.getSession();


if(data.session){

showDashboard();

}

}



/* LOAD ORDERS */

async function loadOrders(){

const ordersBox =
document
.getElementById("orders");


ordersBox.innerHTML =
'<div class="empty">Loading orders...</div>';


const {data,error} =
await supabaseClient
.from("bookings")
.select("*")
.order(
"created_at",
{ascending:false}
);


if(error){

console.error(error);


ordersBox.innerHTML = `

<div class="empty">

❌ Unable to load orders.

<br><br>

${error.message}

</div>

`;

return;

}


allOrders = data || [];


updateStats(allOrders);


applyFilters();

}



/* STATS */

function updateStats(data){

document
.getElementById("totalOrders")
.innerText =
data.length;


document
.getElementById("newOrders")
.innerText =
data.filter(
x => x.status === "new"
).length;


document
.getElementById("preparingOrders")
.innerText =
data.filter(
x => x.status === "preparing"
).length;


document
.getElementById("readyOrders")
.innerText =
data.filter(
x => x.status === "ready"
).length;


document
.getElementById("collectedOrders")
.innerText =
data.filter(
x => x.status === "collected"
).length;


const sales =
data.reduce(

(sum,x) =>

sum +
Number(
x.total_amount || 0
),

0

);


document
.getElementById("totalSales")
.innerText =
sales;

}



/* SEARCH + FILTER */

function applyFilters(){

const search =
document
.getElementById("searchInput")
.value
.toLowerCase()
.trim();


const status =
document
.getElementById("statusFilter")
.value;


const filtered =
allOrders.filter(order => {


const matchesSearch =

String(
order.booking_id || ""
)
.toLowerCase()
.includes(search)

||

String(
order.customer_name || ""
)
.toLowerCase()
.includes(search)

||

String(
order.phone || ""
)
.toLowerCase()
.includes(search);


const matchesStatus =

status === "all"

||

order.status === status;


return (
matchesSearch &&
matchesStatus
);

});


renderOrders(filtered);

}



/* RENDER ORDERS */

function renderOrders(data){

const box =
document
.getElementById("orders");


if(!data.length){

box.innerHTML = `

<div class="empty">

🔎 No matching orders found.

</div>

`;

return;

}


box.innerHTML = "";


data.forEach(order => {


let items = "";


if(Array.isArray(order.items)){

order.items.forEach(item => {

items += `

<div class="item">

<span>

${item.name}
× ${item.quantity}

</span>


<span>

₹${item.price * item.quantity}

</span>

</div>

`;

});

}


box.innerHTML += `

<div class="order">


<div class="order-top">


<div>

<div class="booking-id">

🎟️ ${order.booking_id}

</div>


<div class="order-date">

${new Date(
order.created_at
).toLocaleString()}

</div>

</div>


<div class="status">

${order.status}

</div>


</div>



<div class="customer">

👤 <b>Name:</b>
${order.customer_name}

<br>

📱 <b>Phone:</b>
${order.phone}

<br>

⏰ <b>Pickup:</b>
${order.pickup_time}

</div>



<div class="items">

<b>🥤 Order Items</b>

${items}

</div>



<div class="total">

Total:
₹${order.total_amount}

</div>



<select

onchange="

updateStatus(

'${order.id}',

this.value

)

"

>


<option

value="new"

${order.status === "new" ? "selected" : ""}

>

🆕 New

</option>



<option

value="preparing"

${order.status === "preparing" ? "selected" : ""}

>

🥤 Preparing

</option>



<option

value="ready"

${order.status === "ready" ? "selected" : ""}

>

✅ Ready

</option>



<option

value="collected"

${order.status === "collected" ? "selected" : ""}

>

🎉 Collected

</option>


</select>


<button

class="whatsapp-btn"

onclick="

openWhatsApp(

'${order.phone}',

'${order.booking_id}',

'${order.customer_name}',

'${order.total_amount}',

'${order.status}'

)

"

>

📱 WhatsApp Customer

</button>


</div>

`;

});

}



/* WHATSAPP */

function openWhatsApp(
phone,
bookingId,
customerName,
total,
status
){

let cleanPhone =
String(phone)
.replace(/\D/g,"");


/* Add India country code */

if(cleanPhone.length === 10){

cleanPhone =
"91" + cleanPhone;

}


const message =

`Hello ${customerName} 👋

Your FestCart order update 🎉

🎟️ Booking ID: ${bookingId}

💰 Total: ₹${total}

📌 Status: ${status}

Thank you for ordering from FestCart! 🥤✨

Please visit the FestCart counter for pickup.`;


const whatsappURL =

"https://wa.me/" +
cleanPhone +
"?text=" +
encodeURIComponent(message);


window.open(
whatsappURL,
"_blank"
);

}



/* UPDATE STATUS */

async function updateStatus(
id,
status
){

const {error} =
await supabaseClient
.from("bookings")
.update({

status:status

})
.eq(
"id",
id
);


if(error){

alert(
"Status update failed."
);

console.error(error);

return;

}


await loadOrders();

}



/* START */

checkSession();

</script>


</body>
</html>

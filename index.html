<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FestCart | Pre-Book & Pick Up</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f7f7f8;
      color: #111;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 6%;
      background: #111;
      color: white;
    }

    .logo {
      font-size: 25px;
      font-weight: 800;
    }

    .logo span {
      color: #ffb703;
    }

    .cart-btn {
      border: 0;
      background: #ffb703;
      color: #111;
      padding: 11px 18px;
      border-radius: 30px;
      font-weight: 700;
      cursor: pointer;
    }

    .hero {
      padding: 75px 7%;
      text-align: center;
      background: linear-gradient(135deg, #111, #292929);
      color: white;
    }

    .hero h1 {
      font-size: clamp(40px, 8vw, 75px);
      line-height: 1.05;
    }

    .hero h1 span {
      color: #ffb703;
    }

    .hero p {
      max-width: 600px;
      margin: 20px auto;
      color: #ddd;
      line-height: 1.6;
    }

    .hero button {
      border: 0;
      padding: 14px 25px;
      background: #ffb703;
      border-radius: 30px;
      font-weight: 700;
      cursor: pointer;
    }

    .container {
      width: 88%;
      max-width: 1100px;
      margin: 45px auto;
    }

    .heading {
      margin-bottom: 25px;
    }

    .heading h2 {
      font-size: 32px;
    }

    .heading p {
      color: #777;
      margin-top: 7px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .card {
      overflow: hidden;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,.07);
    }

    .product-image {
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      background: linear-gradient(135deg, #ffb703, #fb8500);
    }

    .card-content {
      padding: 20px;
    }

    .card-content p {
      color: #777;
      margin: 8px 0 18px;
      font-size: 14px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      font-size: 20px;
      font-weight: 800;
    }

    .add-btn {
      border: 0;
      background: #111;
      color: white;
      padding: 10px 17px;
      border-radius: 25px;
      cursor: pointer;
    }

    .box {
      background: white;
      margin-top: 35px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,.06);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid #eee;
    }

    .total {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 21px;
      font-weight: 800;
    }

    .main-btn {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: 0;
      border-radius: 30px;
      background: #ffb703;
      color: #111;
      font-weight: 800;
      cursor: pointer;
    }

    .booking {
      display: none;
    }

    .booking input,
    .booking select {
      width: 100%;
      padding: 14px;
      margin: 8px 0 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
    }

    .booking input:focus,
    .booking select:focus {
      border-color: #ffb703;
    }

    .confirm-btn {
      width: 100%;
      padding: 15px;
      border: 0;
      border-radius: 30px;
      background: #111;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .success {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      background: #f2f2f2;
      line-height: 1.8;
    }

    footer {
      margin-top: 60px;
      padding: 30px;
      text-align: center;
